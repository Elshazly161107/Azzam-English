<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up | Azzam English</title>

        <link rel="icon" href="../MEDIA/main-logo.svg">
        <link rel="stylesheet" href="../general.css">
        <link rel="stylesheet" href="../CSS/signup.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
            integrity="sha512-p1A9B6...etc..." crossorigin="anonymous"
            referrerpolicy="no-referrer" />
    </head>
    <body>
        <header>
            <div class="container">
                <img src="../MEDIA/main-logo.svg" alt="logo">
                <h1></h1>
                <div class="btns">
                    <button class="lang" id="lang">EN</button>
                </div>
                <i id="menu-bars" class="fa-solid fa-bars"></i>
            </div>
        </header>
        <nav>
            <div class="nav">
                <div class="steps">
                    <div>
                        <span>1</span>
                        <p></p>
                    </div>
                    <div>
                        <span>2</span>
                        <p></p>
                    </div>
                    <div>
                        <span>3</span>
                        <p></p>
                    </div>
                    <div>
                        <span>4</span>
                        <p></p>
                    </div>
                </div>
            </div>
        </nav>
        <main>
            <div class="container">
                <div class="form-1 active">
                    <div class="content">
                        <div>
                            <label for="full-name-arabic"></label>
                            <input type="text" id="full-name-arabic">
                        </div>
                        <div>
                            <label for="full-name-english"></label>
                            <input type="text" id="full-name-english">
                        </div>
                        <div>
                            <label for="birthday"></label>
                            <input type="date" id="birthday">
                        </div>
                        <div>
                            <label for="phone"></label>
                            <input type="tel" id="phone">
                        </div>
                        <div>
                            <label for="gender"></label>
                            <select name="gender" id="gender">
                                <option></option>
                                <option></option>
                                <option></option>
                            </select>
                        </div>
                        <div>
                            <label for="home-place"></label>
                            <select name="home-place" id="home-place">
                                <option></option>
                                <option></option>
                                <option></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-2">
                    <div class="content">
                        <div>
                            <label for="guardian-name"></label>
                            <input type="text" id="guardian-name">
                        </div>
                        <div>
                            <label for="guardian-phone"></label>
                            <input type="tel" id="guardian-phone">
                        </div>
                        <div>
                            <label for="guardian-job"></label>
                            <input type="text" id="guardian-job">
                        </div>
                        <div>
                            <label for="guardian-relationship"></label>
                            <select name="guardian-relationship"
                                id="guardian-relationship">
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-3">
                    <div class="content">
                        <div>
                            <label for="education-level"></label>
                            <select name="education-level" id="education-level">
                                <option value></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                            </select>
                        </div>
                        <div class="quiz">
                            <h1></h1>
                            <a href="#">
                                <i class="fa-solid fa-link"></i>
                                <span></span>
                            </a>
                            <table>
                                <thead>
                                    <tr>
                                        <td></td>
                                        <td></td>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>25 - 30</td>
                                        <td>a</td>
                                    </tr>
                                    <tr>
                                        <td>20 - 25</td>
                                        <td>b</td>
                                    </tr>
                                    <tr>
                                        <td>15 - 20</td>
                                        <td>c</td>
                                    </tr>
                                    <tr>
                                        <td>10 - 15</td>
                                        <td>d</td>
                                    </tr>
                                    <tr>
                                        <td>5 - 10</td>
                                        <td>e</td>
                                    </tr>
                                    <tr>
                                        <td>0 - 5</td>
                                        <td>f</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div>
                            <label for="english-level"></label>
                            <select name="english-level" id="english-level">
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                                <option></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-4">
                    <div class="content">
                        <div>
                            <label for="email">البريد الالكتروني</label>
                            <input type="email" id="email">
                        </div>
                        <div class="user-name-div">
                            <i
                                class="fa-solid fa-circle-check available"></i>
                            <i class="fa-solid fa-circle-xmark unavailable"></i>
                            <label for="user-name">اسم المستخدم</label>
                            <input type="text" id="user-name">
                        </div>
                        <div>
                            <label for="password">كلمة المرور</label>
                            <input type="password" id="password">
                        </div>
                        <div>
                            <label for="confirm-password">تأكيد كلمة
                                المرور</label>
                            <input type="text" id="confirm-password">
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <div class="container">
                <div class="info">
                    <i class="fa-solid fa-circle-info"></i>
                    <div class="text">
                        <p></p>
                    </div>
                </div>
                <div class="btns">
                    <button class="previous btn-type-one">
                        <i></i>
                        <span></span>
                    </button>
                    <button class="next btn-type-two">
                        <span></span>
                        <i></i>
                    </button>
                </div>
            </div>
        </footer>
        <div class="complete-signing">
            <div class="bg"></div>
            <div class="content">
                <div class="icon">
                    <div class="load"></div>
                    <div class="load-bg"></div>
                    <div class="check">
                        <i class="fa-solid fa-check"></i>
                    </div>
                </div>
                <h1></h1>
            </div>
        </div>
        <div class="wrong-msg">
            <p></p>
        </div>
    </body>
    <script src="../JS/login-signup/signup.js"></script>
    <script src="../JS/login-signup/signup-lang.js"></script>
</html>
